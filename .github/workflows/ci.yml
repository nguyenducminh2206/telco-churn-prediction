# GitHub Actions workflow: run pytest on every push and pull request.
#
# Lives at .github/workflows/ci.yml — the path is what makes GitHub pick it up.
# Edit this file and push; the next run shows up in the repo's "Actions" tab.

name: CI

# When should this workflow run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Free Linux VM provided by GitHub for each run
    runs-on: ubuntu-latest

    steps:
      # 1. Get our code onto the runner
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Install the Python we want (match local dev as closely as possible)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 3. Install only the libs the tests need (fast)
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      # 4. Run the test suite
      - name: Run pytest
        run: pytest tests/ -v
